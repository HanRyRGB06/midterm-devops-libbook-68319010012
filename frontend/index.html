<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลหนังสือห้องสมุด (libbook)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2,
        h3 {
            color: #2c3e50;
            margin-top: 0;
        }

        .profile-box {
            background: #eef2f7;
            padding: 15px;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #27ae60;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: white;
        }

        th,
        td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #34495e;
            color: white;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-ready {
            background-color: #d4edda;
            color: #155724;
        }

        .badge-borrowed {
            background-color: #fff3cd;
            color: #856404;
        }

        .badge-damaged {
            background-color: #f8d7da;
            color: #721c24;
        }

        .btn-delete {
            background-color: #e74c3c;
            padding: 6px 12px;
            font-size: 14px;
            width: auto;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>📚 ระบบบันทึกข้อมูลหนังสือห้องสมุด (libbook)</h2>

        <div class="profile-box">
            <strong>ผู้พัฒนาระบบ:</strong> วิษณุสรรค์ แก่นตา <br>
            <strong>รหัสนักศึกษา:</strong> 68319010012
        </div>

        <h3>➕ เพิ่มทะเบียนหนังสือใหม่</h3>
        <div class="form-group">
            <div>
                <label>เลขทะเบียน / ISBN</label>
                <input type="text" id="isbn" placeholder="เช่น 978-616-08-1234-5">
            </div>
            <div>
                <label>ชื่อหนังสือ</label>
                <input type="text" id="title" placeholder="เช่น เรียนรู้ DevOps ด้วย Docker">
            </div>
            <div>
                <label>ผู้แต่ง</label>
                <input type="text" id="author" placeholder="เช่น อ.สมศักดิ์ มั่นคง">
            </div>
            <div>
                <label>หมวดหมู่</label>
                <input type="text" id="category" placeholder="เช่น เทคโนโลยี / คอมพิวเตอร์">
            </div>
            <div>
                <label>ปีที่พิมพ์</label>
                <input type="number" id="year" placeholder="เช่น 2026">
            </div>
            <div>
                <label>สถานะหนังสือ</label>
                <select id="status">
                    <option value="พร้อมให้ยืม">🟢 พร้อมให้ยืม</option>
                    <option value="ถูกยืม">🟡 ถูกยืม</option>
                    <option value="ชำรุด">🔴 ชำรุด</option>
                </select>
            </div>
            <div class="full-width">
                <button onclick="saveBook()">💾 บันทึกข้อมูลหนังสือ</button>
            </div>
        </div>

        <h3>📋 รายการหนังสือในระบบ</h3>
        <table>
            <thead>
                <tr>
                    <th>ISBN</th>
                    <th>ชื่อหนังสือ</th>
                    <th>ผู้แต่ง</th>
                    <th>หมวดหมู่</th>
                    <th>ปีที่พิมพ์</th>
                    <th>สถานะ</th>
                    <th>การจัดการ</th>
                </tr>
            </thead>
            <tbody id="bookTableBody">
            </tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>

</html>
