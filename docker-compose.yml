version: '3.8'

services:
  # 1. บริการฐานข้อมูล (Database)
  db:
    image: postgres:16-alpine
    container_name: libbook-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: libbook
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # ดึงสคริปต์สร้างตารางมาทำงานตอนเปิดครั้งแรก (สร้างตาราง books อัตโนมัติ)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # 2. บริการระบบหลังบ้าน (Backend API)
  backend:
    build: ./backend
    container_name: libbook-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: libbook
      DB_PORT: 5432
    depends_on:
      - db

  # 3. บริการหน้าเว็บ (Frontend)
  frontend:
    build: ./frontend
    container_name: libbook-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
